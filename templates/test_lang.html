<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Multilingual Dashboard</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans&display=swap" rel="stylesheet">
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI",sans-serif;
}

body{
    background:#f5f8fa;
    color:#263238;
}

/* ===== TOP BAR ===== */
header{
    height:70px;
    background:linear-gradient(90deg,#ff8c00,#ff6f00);
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 20px;
    color:#fff;
}

.logo{
    font-size:22px;
    font-weight:600;
}

/* ===== LANGUAGE SWITCHER ===== */
.language-switcher select{
    padding:6px 10px;
    border-radius:6px;
    border:none;
    outline:none;
    font-size:14px;
    cursor:pointer;
}

/* ===== CONTENT ===== */
.container{
    padding:40px;
}

.card{
    background:#fff;
    padding:25px;
    border-radius:10px;
    box-shadow:0 8px 20px rgba(0,0,0,0.08);
    max-width:600px;
}

h1{
    margin-bottom:15px;
}

p{
    margin-bottom:20px;
    font-size:16px;
}

button{
    padding:10px 18px;
    border:none;
    border-radius:6px;
    background:#ff6f00;
    color:#fff;
    font-size:15px;
    cursor:pointer;
}

button:hover{
    background:#e65c00;
}

a{
    display:inline-block;
    margin-top:15px;
    color:#ff6f00;
    text-decoration:none;
    font-weight:500;
}
</style>
</head>

<body>

<!-- ===== HEADER ===== -->
<header>
    <div class="logo" data-key="appname"></div>

    <div class="language-switcher">
        <select id="languageSelect">
            <option value="en">English (English)</option>
            <option value="ta">????? (Tamil)</option>
            <option value="ml">?????? (Malayalam)</option>
            <option value="te">?????? (Telugu)</option>
            <option value="kn">????? (Kannada)</option>
            <option value="hi">?????? (Hindi)</option>
            <option value="mr">????? (Marathi)</option>
            <option value="bn">????? (Bengali)</option>
            <option value="pa">?????? (Punjabi)</option>
            <option value="gu">??????? (Gujarati)</option>
            <option value="bh">??????? (Bhojpuri)</option>
        </select>
    </div>
</header>

<!-- ===== CONTENT ===== -->
<div class="container">
    <div class="card">
        <h1 data-key="title"></h1>
        <p data-key="welcome"></p>
        <button data-key="submit"></button>
        <br>
        <a href="#" data-key="logout"></a>
    </div>
</div>

<!-- ===== LANGUAGE SCRIPT ===== -->
<script>
const translations = {

        appname:"My Application",
        title:"Dashboard",
        welcome:"Welcome to the system. Select a language from the top-right corner.",
        submit:"Submit",

        submit:"????????????",
        logout:"???? ?????"
    },
    te:{
        appname:"?? ??????????",
        title:"???????????",
        welcome:"?????????? ???????. ?? ???? ????? ????? ?????????.",
        submit:"???????????",
        logout:"???? ?????"
    },
    kn:{
        appname:"???? ??????????",
        title:"?????????????",
        welcome:"?????????? ??????. ???????? ????????? ???? ?????????.",
        submit:"???????",

    }
};

function changeLanguage(lang){
    localStorage.setItem("language", lang);

    document.querySelectorAll("[data-key]").forEach(el=>{
        const key = el.dataset.key;
        el.innerText = translations[lang][key] || translations.en[key];
    });
}

const savedLang = localStorage.getItem("language") || "en";
document.getElementById("languageSelect").value = savedLang;
changeLanguage(savedLang);

document.getElementById("languageSelect").addEventListener("change", function(){
    changeLanguage(this.value);
});
</script>

</body>
</html>
